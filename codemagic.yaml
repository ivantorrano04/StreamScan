workflows:
  streamscan-release:
    name: StreamScan Multiplatform Release
    max_build_duration: 60
    instance_type: mac_mini_m1 # Necesario para compilar iOS
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      
      - name: Generate Launcher Icons
        script: |
          # Esto asegura que los iconos se generen también en el servidor de Codemagic
          flutter pub run flutter_launcher_icons:main
          
      - name: Build Android APK (Optimized)
        script: |
          # Generamos el APK dividido por arquitectura para que no pese 177MB
          flutter build apk --release --split-per-abi

      - name: Build iOS App (Unsigned)
        script: |
          # Compilamos para iOS sin firma digital
          flutter build ios --release --no-codesign
          # Empaquetamos el .app en un zip para que puedas probarlo
          cd build/ios/iphoneos
          zip -r StreamScan_iOS.app.zip Runner.app
          mv StreamScan_iOS.app.zip $CM_BUILD_DIR/

    artifacts:
      - build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - StreamScan_iOS.app.zip